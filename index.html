<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Einkauf">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/180/000000/shopping-basket-2.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/96/000000/shopping-basket-2.png">
    
    <title>Einkaufsliste | Gemeinsamer Familien-Einkauf</title>
    <meta name="description" content="Eine einfache, cloud-synchronisierte Einkaufsliste für die ganze Familie. Erstellen, teilen und gemeinsam einkaufen.">
    <meta name="keywords" content="Einkaufsliste, Shopping List, Familie, Firebase, Cloud Sync, Kostenlos">
    <meta name="author" content="Rafael Rygiel">
    <meta name="theme-color" content="#3b82f6">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#000000', card: '#1C1C1E', text: '#FFFFFF', subtext: '#8E8E93', border: '#38383A' }
                    },
                    padding: { 'safe-top': 'env(safe-area-inset-top)', 'safe-bottom': 'env(safe-area-inset-bottom)' }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        * { transition-property: background-color, border-color, color, opacity, transform; transition-duration: 0.2s; }

        .category-header {
            position: sticky;
            top: 0;
            z-index: 5;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .edit-btn { opacity: 0; transition: opacity 0.2s; }
        
        @media (hover: hover) {
            .item-card:hover .delete-btn { opacity: 1; }
            .item-card:hover .edit-btn { opacity: 1; }
        }
        .item-card:active .delete-btn { opacity: 1; }
        .item-card:active .edit-btn { opacity: 1; }

        .modal-overlay { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .completed-text { text-decoration: line-through; opacity: 0.5; }
        .checkbox-circle { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="h-screen flex flex-col items-center bg-gray-50 dark:bg-black text-gray-900 dark:text-white transition-colors duration-300">

    <div class="w-full max-w-md h-full flex flex-col relative bg-white dark:bg-[#1C1C1E] md:h-auto md:max-h-[90vh] md:rounded-[2.5rem] md:shadow-2xl md:border md:border-gray-200/50 md:dark:border-gray-800">
        
        <!-- Import Modal -->
        <div id="import-modal" class="hidden absolute inset-0 z-50 modal-overlay bg-black/40 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-[#2C2C2E] w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-slide-up">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold dark:text-white">Liste importieren</h3>
                    <button onclick="closeImport()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-lg"></i></button>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Text aus Gemini hier einfügen:</p>
                <textarea id="import-area" rows="5" placeholder="z.B. 2 Milch, 500g Nudeln, Äpfel..." class="w-full bg-gray-100 dark:bg-[#1C1C1E] dark:text-white rounded-2xl px-4 py-3 text-sm mb-4 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                <button onclick="processImport()" class="w-full bg-blue-500 text-white py-3 rounded-2xl font-bold hover:bg-blue-600 transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                    Importieren
                </button>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="edit-modal" class="hidden absolute inset-0 z-50 modal-overlay bg-black/40 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-[#2C2C2E] w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-slide-up">
                <h3 class="text-lg font-bold mb-4 dark:text-white">Artikel bearbeiten</h3>
                <input type="text" id="edit-input" class="w-full bg-gray-100 dark:bg-[#1C1C1E] dark:text-white rounded-2xl px-4 py-3 text-lg mb-4 focus:ring-2 focus:ring-blue-500 outline-none" inputmode="text" autocapitalize="sentences">
                <div class="flex gap-3">
                    <button onclick="closeEdit()" class="flex-1 py-3 rounded-2xl font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">Abbrechen</button>
                    <button onclick="saveEdit()" class="flex-1 py-3 rounded-2xl font-bold bg-blue-500 text-white shadow-lg shadow-blue-500/20">Speichern</button>
                </div>
            </div>
        </div>

        <!-- Header Area -->
        <div class="bg-white/90 dark:bg-[#1C1C1E]/90 backdrop-blur-md px-6 pb-4 pt-safe-top md:pt-6 border-b border-gray-100 dark:border-[#2C2C2E] z-10 shrink-0 sticky top-0">
            <div class="flex justify-between items-center mb-4 mt-2">
                <div>
                    <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.2em] mb-0.5">Familie</h2>
                    <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white tracking-tight">Einkaufsliste</h1>
                </div>
                <div class="flex gap-2">
                    <button onclick="openImport()" class="bg-gray-100 dark:bg-[#2C2C2E] text-gray-600 dark:text-gray-300 w-10 h-10 rounded-xl flex items-center justify-center active:scale-95 transition-all">
                        <i class="fas fa-file-import"></i>
                    </button>
                    <button onclick="shareList()" class="bg-blue-50 dark:bg-blue-900/20 text-blue-500 w-10 h-10 rounded-xl flex items-center justify-center active:scale-95 transition-all">
                        <i class="fas fa-share-nodes"></i>
                    </button>
                </div>
            </div>

            <div class="bg-gray-100 dark:bg-[#2C2C2E] rounded-full h-1.5 w-full overflow-hidden mb-4 flex">
                <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div class="flex flex-col gap-3">
                <div class="flex gap-2 relative">
                    <input type="text" id="new-item-input" placeholder="z.B. 3 Milch, 500g Nudeln" 
                        class="flex-1 bg-gray-100 dark:bg-[#2C2C2E] text-gray-900 dark:text-white rounded-2xl pl-4 pr-12 py-3.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all placeholder-gray-400 appearance-none"
                        autocapitalize="sentences" autocomplete="off">
                    
                    <button onclick="addNewItem()" class="absolute right-1 top-1 bottom-1 bg-gray-900 dark:bg-white text-white dark:text-black rounded-xl w-10 flex items-center justify-center hover:scale-105 active:scale-90 transition-all shadow-md">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                
                <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1" id="category-selector"></div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto bg-white dark:bg-black px-2 pb-24 pt-2" id="active-list"></div>

        <div id="empty-state" class="hidden flex-col items-center justify-center flex-1 text-center p-10 pb-32 dark:bg-black">
            <div class="w-20 h-20 bg-gray-50 dark:bg-gray-800 rounded-[2rem] flex items-center justify-center mb-4 animate-bounce">
                <i class="fas fa-carrot text-3xl text-orange-400"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 dark:text-white">Alles leer?</h3>
            <p class="text-gray-400 text-sm">Füge etwas hinzu oder importiere eine Liste.</p>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white/90 dark:bg-[#1C1C1E]/90 backdrop-blur-xl border-t border-gray-100 dark:border-[#2C2C2E] px-6 pb-safe-bottom pt-4 flex items-center justify-between">
            <button onclick="toggleCompletedList()" class="flex items-center gap-2 text-gray-500 dark:text-gray-400 active:text-gray-900 dark:active:text-white transition-colors py-2">
                <span class="text-xs font-bold uppercase tracking-widest">Erledigt (<span id="completed-count">0</span>)</span>
                <i id="toggle-icon" class="fas fa-chevron-up text-[10px] transition-transform duration-300"></i>
            </button>
            <button onclick="clearCompleted()" class="text-xs font-bold text-red-500 uppercase tracking-widest px-2 py-2 active:opacity-50">
                Löschen
            </button>
        </div>

        <div id="completed-container" class="hidden absolute bottom-[calc(4rem+env(safe-area-inset-bottom))] left-2 right-2 max-h-[40vh] bg-white dark:bg-[#2C2C2E] rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-700 overflow-y-auto z-20 p-2 space-y-1">
            <div id="completed-list"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            initializeFirestore,
            persistentLocalCache,
            persistentMultipleTabManager,
            collection,
            addDoc,
            updateDoc,
            deleteDoc,
            doc,
            onSnapshot,
            query,
            orderBy,
            serverTimestamp,
            writeBatch,
            getDocs,
            where
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFiysUmKOqmgnm4TPk2zfoU-k0WDfRpeg",
            authDomain: "einkaufsliste-rafael-2026.firebaseapp.com",
            projectId: "einkaufsliste-rafael-2026",
            storageBucket: "einkaufsliste-rafael-2026.firebasestorage.app",
            messagingSenderId: "893468412805",
            appId: "1:893468412805:web:49433a06233dc915de52ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
        });
        const itemsCol = collection(db, "items");

        const categories = {
            'obst_gemuese': { id: 'obst_gemuese', name: 'Obst & Gemüse', icon: '🥑', color: 'text-green-600', bg: 'bg-green-500' },
            'kuehlregal': { id: 'kuehlregal', name: 'Kühlregal', icon: '🧀', color: 'text-blue-600', bg: 'bg-blue-500' },
            'fleisch': { id: 'fleisch', name: 'Fleisch', icon: '🥩', color: 'text-red-600', bg: 'bg-red-500' },
            'vorrat': { id: 'vorrat', name: 'Vorrat', icon: '🍝', color: 'text-amber-600', bg: 'bg-amber-500' },
            'sonstiges': { id: 'sonstiges', name: 'Sonstiges', icon: '🛒', color: 'text-gray-500', bg: 'bg-gray-500' }
        };

        let items = [];
        let selectedCategory = 'obst_gemuese';
        let editItemId = null;

        // Initialize App
        function init() {
            renderCategorySelector();
            
            // Real-time listener from Firestore
            const q = query(itemsCol, orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                items = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                render();
            });
        }

        function parseItemInput(text) {
            let cleanText = text.replace(/^[\-\*\•]\s*/, '').trim();
            const match = cleanText.match(/^(\d+(\.\d+)?[a-zA-Z]*|\d+\s*[xX]?)\s+(.+)$/);
            if (match) {
                return { qty: match[1].replace(/\s/g, ''), name: match[3] };
            }
            return { qty: null, name: cleanText };
        }

        function determineCategory(name) {
            const n = name.toLowerCase();
            if (n.match(/(apfel|birne|banane|gurke|tomate|salat|spinat|zwiebel|kartoffel|karotte|obst|gemüse|beere|zitrone|paprika|brokkoli|knoblauch|ingwer)/)) return 'obst_gemuese';
            if (n.match(/(milch|käse|joghurt|quark|sahne|butter|feta|mozarella|ei|käse|philadelphia|mascarpone)/)) return 'kuehlregal';
            if (n.match(/(fleisch|wurst|bacon|hähnchen|rind|gulasch|salami|hackfleisch|steak|schinken)/)) return 'fleisch';
            if (n.match(/(nudel|reis|mehl|zucker|salz|brot|toast|brötchen|konserve|glas|dose|öl|essig|gewürz|kaffee|tee|müsli|haferflocken|spaghetti|pesto)/)) return 'vorrat';
            return 'sonstiges';
        }

        async function addNewItem() {
            const input = document.getElementById('new-item-input');
            const rawText = input.value.trim();
            if (!rawText) return;

            const { qty, name } = parseItemInput(rawText);
            
            try {
                await addDoc(itemsCol, {
                    name: name,
                    qty: qty,
                    category: selectedCategory,
                    completed: false,
                    timestamp: serverTimestamp()
                });
                vibrate([10]);
                input.value = '';
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        }

        async function processImport() {
            const text = document.getElementById('import-area').value;
            if (!text.trim()) return;
            
            const lines = text.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);
            const batch = writeBatch(db);

            lines.forEach(line => {
                const { qty, name } = parseItemInput(line);
                const newDocRef = doc(itemsCol);
                batch.set(newDocRef, {
                    name: name,
                    qty: qty,
                    category: determineCategory(name),
                    completed: false,
                    timestamp: serverTimestamp()
                });
            });

            try {
                await batch.commit();
                closeImport();
                vibrate([50]);
            } catch (e) {
                console.error("Error committing batch: ", e);
            }
        }

        function openEdit(event, id) {
            event.stopPropagation();
            const item = items.find(i => i.id === id);
            if (!item) return;

            editItemId = id;
            const val = item.qty ? `${item.qty} ${item.name}` : item.name;
            document.getElementById('edit-input').value = val;
            document.getElementById('edit-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('edit-input').focus(), 100);
        }

        function closeEdit() {
            document.getElementById('edit-modal').classList.add('hidden');
            editItemId = null;
        }

        async function saveEdit() {
            if (!editItemId) return;
            const newText = document.getElementById('edit-input').value.trim();
            if (newText) {
                const { qty, name } = parseItemInput(newText);
                const itemRef = doc(db, "items", editItemId);
                try {
                    await updateDoc(itemRef, {
                        name: name,
                        qty: qty
                    });
                } catch (e) {
                    console.error("Error updating document: ", e);
                }
            }
            closeEdit();
        }

        function createItemHTML(item, isCompleted) {
            const qtyBadge = item.qty ? `<span class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold px-2 py-0.5 rounded-md mr-2">${item.qty}</span>` : '';
            
            return `
                <div onclick="toggleItem('${item.id}')" 
                    class="item-card bg-white dark:bg-[#1C1C1E] mx-2 mb-2 p-4 rounded-2xl flex items-center gap-3 cursor-pointer active:scale-[0.98] select-none animate-slide-up relative border border-transparent dark:border-transparent ${!isCompleted ? 'shadow-sm border-gray-50 dark:border-gray-800' : ''}">
                    
                    <div class="w-6 h-6 rounded-full border-[1.5px] flex items-center justify-center checkbox-circle shrink-0
                        ${isCompleted ? 'bg-blue-500 border-blue-500' : 'border-gray-300 dark:border-gray-600'}">
                        ${isCompleted ? '<i class="fas fa-check text-white text-[10px]"></i>' : ''}
                    </div>

                    <div class="flex-1 min-w-0 flex items-center overflow-hidden">
                        <div class="truncate ${isCompleted ? 'completed-text' : 'text-gray-900 dark:text-gray-100'} text-[15px] font-medium leading-tight">
                            ${qtyBadge}${item.name}
                        </div>
                    </div>

                    ${!isCompleted ? `
                    <button onclick="openEdit(event, '${item.id}')" class="edit-btn text-gray-300 hover:text-blue-500 p-2">
                        <i class="fas fa-pen text-xs"></i>
                    </button>
                    ` : ''}
                    
                    <button onclick="deleteItem(event, '${item.id}')" class="delete-btn text-gray-300 hover:text-red-500 p-2">
                        <i class="fas fa-times text-sm"></i>
                    </button>
                </div>
            `;
        }

        function renderCategorySelector() {
            const container = document.getElementById('category-selector');
            container.innerHTML = Object.values(categories).map(cat => `
                <button onclick="selectCategory('${cat.id}')" 
                    class="px-3 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all border ${
                        selectedCategory === cat.id 
                        ? `bg-gray-900 dark:bg-white text-white dark:text-black border-transparent` 
                        : 'bg-white dark:bg-[#2C2C2E] border-gray-100 dark:border-gray-700 text-gray-500 dark:text-gray-400'
                    }">
                    ${cat.icon} ${cat.name}
                </button>
            `).join('');
        }

        window.selectCategory = (id) => { vibrate([5]); selectedCategory = id; renderCategorySelector(); };
        
        function render() {
            const activeEl = document.getElementById('active-list');
            const completedEl = document.getElementById('completed-list');
            const emptyEl = document.getElementById('empty-state');
            
            if (!activeEl || !completedEl || !emptyEl) return;
            
            activeEl.innerHTML = ''; completedEl.innerHTML = '';
            
            const active = items.filter(i => !i.completed);
            const completed = items.filter(i => i.completed);
            
            const grouped = active.reduce((acc, item) => {
                const c = item.category || 'sonstiges';
                if(!acc[c]) acc[c] = []; acc[c].push(item); return acc;
            }, {});

            Object.keys(categories).forEach(catId => {
                if(grouped[catId]) {
                    activeEl.insertAdjacentHTML('beforeend', `<div class="px-4 py-2 mt-2 text-[11px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest sticky top-0 bg-white/50 dark:bg-black/50 backdrop-blur-sm z-10">${categories[catId].name}</div>`);
                    grouped[catId].forEach(i => activeEl.insertAdjacentHTML('beforeend', createItemHTML(i, false)));
                }
            });

            completed.forEach(i => completedEl.insertAdjacentHTML('beforeend', createItemHTML(i, true)));
            
            const total = items.length;
            const done = completed.length;
            document.getElementById('progress-bar').style.width = total ? `${(done/total)*100}%` : '0%';
            document.getElementById('completed-count').innerText = done;
            
            emptyEl.classList.toggle('hidden', active.length > 0 || total > 0);
            activeEl.classList.toggle('hidden', active.length === 0 && total === 0);
        }

        function vibrate(p=[10]) { if(navigator.vibrate) navigator.vibrate(p); }
        
        async function toggleItem(id) {
            const item = items.find(i => i.id === id);
            if(item) {
                const itemRef = doc(db, "items", id);
                try {
                    await updateDoc(itemRef, { completed: !item.completed });
                    vibrate([5]);
                } catch (e) { console.error(e); }
            }
        }

        async function deleteItem(e, id) { 
            e.stopPropagation(); 
            const itemRef = doc(db, "items", id);
            try {
                await deleteDoc(itemRef);
                vibrate([10]);
            } catch (e) { console.error(e); }
        }

        async function clearCompleted() { 
            if(confirm('Erledigte löschen?')) { 
                const completed = items.filter(i => i.completed);
                const batch = writeBatch(db);
                completed.forEach(item => {
                    batch.delete(doc(db, "items", item.id));
                });
                try {
                    await batch.commit();
                    vibrate([20]);
                } catch (e) { console.error(e); }
            } 
        }
        
        window.openImport = () => { document.getElementById('import-modal').classList.remove('hidden'); document.getElementById('import-area').focus(); };
        window.closeImport = () => { document.getElementById('import-modal').classList.add('hidden'); };
        
        async function shareList() {
            const active = items.filter(i => !i.completed);
            if(!active.length) return;
            let t = "🛒 Einkauf:\n";
            active.forEach(i => t += `- ${i.qty ? i.qty+' ' : ''}${i.name}\n`);
            if(navigator.share) try { await navigator.share({title:'Liste', text:t}); } catch(e){}
            else {
                navigator.clipboard.writeText(t);
                alert('Kopiert!');
            }
        }

        document.getElementById('new-item-input').addEventListener('keypress', e => { if(e.key === 'Enter') addNewItem(); });
        
        window.toggleCompletedList = () => {
            const c = document.getElementById('completed-container');
            const i = document.getElementById('toggle-icon');
            c.classList.toggle('hidden');
            i.style.transform = c.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        // Make functions global for inline onclick
        window.addNewItem = addNewItem;
        window.toggleItem = toggleItem;
        window.deleteItem = deleteItem;
        window.clearCompleted = clearCompleted;
        window.processImport = processImport;
        window.openEdit = openEdit;
        window.closeEdit = closeEdit;
        window.saveEdit = saveEdit;
        window.shareList = shareList;

        init();
    </script>
</body>
</html>
